# Nightly Consolidation Configuration
#
# This file configures the nightly memory consolidation process.
# Values can be overridden by environment variables of the same name.
#
# Usage:
#   The consolidation script reads this file at startup.
#   Environment variables take precedence over values set here.

# Hour (0-23) to run consolidation (cron schedule: 0 $CONSOLIDATION_HOUR * * *)
CONSOLIDATION_HOUR=3

# Claude model to use for synthesis
CONSOLIDATION_MODEL=claude-sonnet-4-20250514

# Maximum number of unconsolidated events to process per run
MAX_EVENTS_PER_BATCH=500

# Path to the SQLite memory database
MEMORY_DB=~/lobster-workspace/data/memory.db

# Path to canonical memory files
CANONICAL_DIR=~/lobster-workspace/memory/canonical

# Path to archive directory for old digests
ARCHIVE_DIR=~/lobster-workspace/memory/archive

# Log level for consolidation script (DEBUG, INFO, WARNING, ERROR)
CONSOLIDATION_LOG_LEVEL=INFO
